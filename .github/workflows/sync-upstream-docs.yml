name: Sync docs from upstream Vantiq repos

# Weekly sync of this knowledge repo from four upstream sources. Every target
# is rebuilt from scratch each run (wipe-then-copy), so files removed upstream
# never linger here. Only *.md is mirrored (this is a documentation corpus).
#
#   docs/             <- Vantiq/docs (PRIVATE), locale/en/md/dev/**.md
#                        copied FLAT (subdirectory structure NOT preserved).
#   extSrc/           <- Vantiq/vantiq-extension-sources (public)
#                        *.md, structure PRESERVED.
#   sdk/<shortname>/  <- every PUBLIC Vantiq repo whose name contains "sdk"
#                        (discovered dynamically), *.md, structure PRESERVED.
#   k8sdeploy_tools/  <- Vantiq/k8sdeploy_tools (PRIVATE)
#                        *.md, structure PRESERVED.
#
# Prerequisite: repo secret VANTIQ_SYNC_TOKEN that can READ both private repos
# (Vantiq/docs and Vantiq/k8sdeploy_tools). A fine-grained PAT with
# Contents:Read on those two repos, or a classic PAT with the `repo` scope.
# The public sources need no credentials.

on:
  # Scheduled runs disabled 2026-07-22: the official home for this KB is now
  # Vantiq/training, where the weekly cron lives. This repo (lisack/VantiqKnowledge)
  # is kept alongside as a fallback and will be retired. Manual runs still allowed.
  #   schedule:
  #     - cron: '0 6 * * 1'      # every Monday 06:00 UTC
  workflow_dispatch: {}       # allow manual runs from the Actions tab

permissions:
  contents: write             # lets the job push the synced docs back

concurrency:
  group: sync-upstream-docs
  cancel-in-progress: false

env:
  DEV_SRC_PATH: locale/en/md/dev          # subtree in Vantiq/docs
  DOCS_DIR: docs                          # flat target
  EXTSRC_REPO: Vantiq/vantiq-extension-sources
  EXTSRC_DIR: extSrc                      # structure-preserving target
  SDK_ORG: Vantiq
  SDK_DIR: sdk                            # structure-preserving target
  K8S_REPO: Vantiq/k8sdeploy_tools        # PRIVATE
  K8S_DIR: k8sdeploy_tools                # structure-preserving target

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout VantiqKnowledge
        uses: actions/checkout@v5
        with:
          fetch-depth: 0          # full history so the push step can rebase

      # 1) dev docs (private) -> docs/  (FLAT, wipe-then-copy)
      - name: Sync dev markdown (flat) from Vantiq/docs
        run: |
          set -euo pipefail
          git clone --no-checkout --depth 1 --filter=blob:none \
            "https://x-access-token:${VANTIQ_SYNC_TOKEN}@github.com/Vantiq/docs.git" /tmp/vantiq-docs
          ( cd /tmp/vantiq-docs && git sparse-checkout init --cone && git sparse-checkout set "${DEV_SRC_PATH}" && git checkout )
          # Flatten *.md into docs/. Same-named files in different subdirs:
          #   identical content -> keep one bare copy (dedupe);
          #   differing content -> disambiguate by folding the subdir into the name.
          python3 - "/tmp/vantiq-docs/${DEV_SRC_PATH}" "${DOCS_DIR}" <<'PY'
          import os, sys, hashlib, shutil
          src, dest = sys.argv[1], sys.argv[2]
          if not os.path.isdir(src):
              sys.exit(f"::error::Source path not found in Vantiq/docs: {src}")
          by_base = {}
          for r, _, fs in os.walk(src):
              for f in fs:
                  if f.endswith(".md"):
                      by_base.setdefault(f, []).append(os.path.join(r, f))
          shutil.rmtree(dest, ignore_errors=True)
          os.makedirs(dest, exist_ok=True)
          renamed = []
          for base, paths in sorted(by_base.items()):
              if len(paths) == 1:
                  shutil.copyfile(paths[0], os.path.join(dest, base))
                  continue
              digests = {hashlib.sha256(open(p, "rb").read()).hexdigest(): p for p in paths}
              if len(digests) == 1:                       # identical duplicates
                  shutil.copyfile(paths[0], os.path.join(dest, base))
              else:                                        # genuinely different
                  for p in paths:
                      nm = os.path.relpath(p, src).replace(os.sep, "_")
                      shutil.copyfile(p, os.path.join(dest, nm))
                      renamed.append((base, nm))
          if renamed:
              print("Disambiguated differing same-named files:")
              for b, n in renamed:
                  print(f"  {b} -> {n}")
          PY
        env:
          VANTIQ_SYNC_TOKEN: ${{ secrets.VANTIQ_SYNC_TOKEN }}

      # 2) extension sources (public) -> extSrc/  (structure preserved)
      - name: Sync markdown from ${{ env.EXTSRC_REPO }} into ${{ env.EXTSRC_DIR }}/
        run: |
          set -euo pipefail
          git clone --depth 1 "https://github.com/${EXTSRC_REPO}.git" /tmp/extsrc
          rm -rf "${EXTSRC_DIR}"; mkdir -p "${EXTSRC_DIR}"
          rsync -a --prune-empty-dirs \
            --exclude='.git/' --include='*/' --include='*.md' --exclude='*' \
            /tmp/extsrc/ "${EXTSRC_DIR}/"

      # 3) all public Vantiq *sdk* repos -> sdk/<shortname>/  (structure preserved)
      - name: Sync markdown from public Vantiq sdk repos into ${{ env.SDK_DIR }}/
        run: |
          set -euo pipefail
          repos=()
          page=1
          while :; do
            resp="$(curl -fsSL "https://api.github.com/orgs/${SDK_ORG}/repos?per_page=100&type=public&page=${page}")"
            cnt="$(printf '%s' "$resp" | python3 -c 'import sys,json;print(len(json.load(sys.stdin)))')"
            names="$(printf '%s' "$resp" | python3 -c "import sys,json;[print(r['name']) for r in json.load(sys.stdin) if not r.get('archived') and 'sdk' in r['name'].lower()]")"
            [ -n "$names" ] && while IFS= read -r n; do repos+=("$n"); done <<< "$names"
            [ "$cnt" -lt 100 ] && break
            page=$((page+1))
          done
          if [ "${#repos[@]}" -eq 0 ]; then
            echo "::error::No public Vantiq repos with 'sdk' in the name were found"; exit 1
          fi
          echo "sdk repos: ${repos[*]}"

          rm -rf "${SDK_DIR}"; mkdir -p "${SDK_DIR}"
          for repo in "${repos[@]}"; do
            short="$(printf '%s\n' "$repo" | tr '-' '\n' | grep -viE '^(vantiq|sdk)$' | paste -sd- - || true)"
            [ -z "$short" ] && short="$repo"
            short="$(printf '%s' "$short" | tr '[:upper:]' '[:lower:]')"
            git clone --depth 1 "https://github.com/${SDK_ORG}/${repo}.git" "/tmp/sdk_${short}"
            mkdir -p "${SDK_DIR}/${short}"
            rsync -a --prune-empty-dirs \
              --exclude='.git/' --include='*/' --include='*.md' --exclude='*' \
              "/tmp/sdk_${short}/" "${SDK_DIR}/${short}/"
          done

      # 4) k8s deploy tools (private) -> k8sdeploy_tools/  (structure preserved)
      - name: Sync markdown from ${{ env.K8S_REPO }} into ${{ env.K8S_DIR }}/
        run: |
          set -euo pipefail
          git clone --depth 1 \
            "https://x-access-token:${VANTIQ_SYNC_TOKEN}@github.com/${K8S_REPO}.git" /tmp/k8s
          rm -rf "${K8S_DIR}"; mkdir -p "${K8S_DIR}"
          rsync -a --prune-empty-dirs \
            --exclude='.git/' --include='*/' --include='*.md' --exclude='*' \
            /tmp/k8s/ "${K8S_DIR}/"
        env:
          VANTIQ_SYNC_TOKEN: ${{ secrets.VANTIQ_SYNC_TOKEN }}

      - name: Commit & push if anything changed
        run: |
          set -euo pipefail
          git config user.name  "vantiq-docs-sync[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          targets="${DOCS_DIR} ${EXTSRC_DIR} ${SDK_DIR} ${K8S_DIR}"
          if [ -z "$(git status --porcelain -- $targets)" ]; then
            echo "No documentation changes upstream."
            exit 0
          fi
          git add -- $targets
          git commit -m "chore(docs): sync from upstream Vantiq repos ($(date -u +%Y-%m-%d))"
          # Resilient push: origin/main may have advanced since checkout (another
          # sync run, a manual push, or delayed cron). Rebase our commit on top
          # of the latest main and retry a few times to absorb races.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Synced changes pushed (attempt ${attempt})."
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing on latest origin/main..."
            git pull --rebase origin main
            sleep 5
          done
          echo "::error::Failed to push after multiple rebase/retry attempts."
          exit 1

      # Hop ②: refresh the manifested kr/ corpus in _144_TestKRMCP from the
      # just-synced working tree. Content-only: refreshes docs that drifted,
      # leaves manifests/structure and namespace-native docs untouched.
      - name: Publish refreshed docs to _144_TestKRMCP namespace
        run: python3 .github/scripts/kr_sync.py --publish
        env:
          KR_TOKEN: ${{ secrets.VANTIQ_KR_WRITE_TOKEN }}
          KR_REPO: ${{ github.workspace }}

      # Hop ③: reconcile the kr/ manifests in _144_TestKRMCP against the namespace
      # doc set. MERGE model — existing descriptions are preserved verbatim; a
      # genuinely new doc is appended to its subject manifest with a filename draft
      # + "[auto-draft]" marker; orphans are reported (not pruned, so a transient
      # absence never loses a curated line). Writes a weekly drift report.
      - name: Reconcile kr/ manifests & write drift report
        run: python3 .github/scripts/kr_manifest_reconcile.py --apply --report "$GITHUB_WORKSPACE/manifest-drift-report.md"
        env:
          KR_TOKEN: ${{ secrets.VANTIQ_KR_WRITE_TOKEN }}

      # Hop ④: census the repo's source files against the namespace docs (both
      # directions). Report-only by default: lists namespace docs whose repo source
      # is gone (orphans) and repo files not yet published (content candidates vs
      # tooling/meta). Publishing/removal stay human decisions, so no writes here
      # unless --prune-missing is added. Writes a weekly census report.
      - name: Doc census (repo ↔ namespace) report
        run: python3 .github/scripts/kr_doc_census.py --report "$GITHUB_WORKSPACE/doc-census-report.md"
        env:
          KR_TOKEN: ${{ secrets.VANTIQ_KR_WRITE_TOKEN }}
          KR_REPO: ${{ github.workspace }}

      - name: Commit & push KB reports
        run: |
          set -euo pipefail
          git config user.name  "vantiq-docs-sync[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          reports="manifest-drift-report.md doc-census-report.md"
          if [ -z "$(git status --porcelain -- $reports)" ]; then
            echo "KB reports unchanged."
            exit 0
          fi
          git add -- $reports
          git commit -m "chore(kb): weekly manifest drift + doc census reports ($(date -u +%Y-%m-%d))"
          # Same resilient push as the docs-sync step: rebase on latest main and retry.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "KB reports pushed (attempt ${attempt})."
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing on latest origin/main..."
            git pull --rebase origin main
            sleep 5
          done
          echo "::error::Failed to push KB reports after multiple attempts."
          exit 1
